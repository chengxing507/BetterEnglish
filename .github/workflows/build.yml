name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gradle

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.5

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Create Release and Upload APK
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.5.2
          name: BetterEnglish v1.5.2
          body: |
            ## BetterEnglish v1.5.2

            英语默写 Android 应用最新版 APK。

            ### v1.5.2 更新内容

            1. 🔍 **复核保留错题** — 复核通过/不通过后保留错题在错题回顾中，显示"复核通过/不通过"标签
            2. 📊 **监督面板升级**
               - 展示错题数统计（单词/词组/句子分别统计）
               - 展示具体错题及错误答案
               - 结算界面时监督面板同步显示结算信息
               - 新增弹窗功能，可向答题端发送需手动确认的消息，确认后显示已确认
            3. 📛 **监控面板改名为监督面板**
            4. 🎮 **版本号彩蛋** — 管理面板入口独立至首页右上角
          files: app/build/outputs/apk/debug/*.apk
          draft: false
          prerelease: false
